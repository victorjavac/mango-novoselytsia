<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>QR-код для відгуків МАНГО</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 💻 ЕКРАННИЙ РЕЖИМ */
        body {
            background-color: #cbd5e1; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
            padding: 20px;
        }

        .a4-page {
            width: 210mm;
            height: 297mm;
            background-color: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
            padding: 15mm 20mm;
            overflow: hidden;
        }

        .logo-image {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: -40px; 
        }

        .logo-image img {
            max-width: 100mm; 
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .stars {
            color: #fbbc05;
            font-size: 15mm; /* Трохи збільшено для текстових зірок */
            margin-bottom: 15px;
            letter-spacing: 5px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 9mm;
            color: #111;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        p {
            font-size: 4.5mm;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.5;
            position: relative;
            z-index: 2;
        }

        .qr-wrapper {
            background: #fff;
            padding: 10px;
            border-radius: 16px;
            border: 2px solid #f0f0f0;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .qr-code {
            width: 80mm; 
            height: 80mm;
            object-fit: contain;
            display: block;
        }

        .footer-text {
            font-size: 4mm;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }

        /* 🖨️ РЕЖИМ ДРУКУ */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                background-color: #fff; 
                display: block;
                padding: 0;
            }

            .a4-page {
                box-shadow: none;       
                border: none;
                width: 210mm;
                height: 297mm;
                margin: 0 auto;
                justify-content: center;
                padding: 15mm 20mm; 
            }

            .qr-wrapper {
                border: 2px solid #eee; 
            }

            body, .a4-page {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div class="a4-page">
        <div class="logo-image">
            <img src="logo_print.jpg" alt="МАНГО">
        </div>        
        
        <div class="stars">
            ★ ★ ★ ★ ★
        </div>

        <h1>Сподобалась покупка?</h1>
        <p>Наведіть камеру смартфона на QR-код<br>та залишіть відгук про наш магазин.<br>Для нас це дуже важливо!</p>

        <div class="qr-wrapper">
            <img src="qr.png" alt="QR код для відгуків" class="qr-code">
        </div>

        <div class="footer-text">Дякуємо, що обираєте нас ✨</div>
    </div>

</body>
</html>
