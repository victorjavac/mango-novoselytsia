<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>QR-код для відгуків МАНГО</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #ede7f3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comfortaa', sans-serif;
            padding: 20px;
        }

        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: linear-gradient(180deg, #faf5ff 0%, #fffefe 100%);
            border: 1px solid rgba(118, 70, 145, 0.16);
            box-shadow: 0 24px 60px rgba(80, 61, 125, 0.14);
            border-radius: 18px;
            overflow: hidden;
            padding: 20mm;
            display: flex;
            flex-direction: column;
        }

        .page-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
            margin-top: 10mm;
        }

        .logo-image {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-image img {
            max-width: 130mm; /* ЗБІЛЬШЕНО З 95mm */
            width: 100%;
            height: auto;
        }

        .headline {
            font-size: 10mm;
            color: #301830;
            letter-spacing: 0.2em;
            margin-top: 6mm;
        }

        .subheadline {
            font-size: 5.5mm;
            color: #52435b;
            line-height: 1.45;
            max-width: 140mm;
        }

        .stars {
            font-size: 14mm;
            color: #f6c844;
            letter-spacing: 2mm;
            margin: 2mm 0;
            line-height: 1;
            text-shadow: 0 2px 4px rgba(246, 200, 68, 0.3);
        }

        .qr-card {
            width: 100%;
            max-width: 110mm;
            padding: 14px;
            background: #fff;
            border-radius: 24px;
            border: 1px solid rgba(146, 105, 183, 0.14);
            box-shadow: 0 20px 35px rgba(121, 76, 145, 0.09);
        }

        .qr-code {
            width: 100%;
            height: auto;
            display: block;
        }

        .note {
            font-size: 4.2mm;
            color: #6a566d;
            max-width: 145mm;
            line-height: 1.6;
            margin-top: 4px;
        }

        .footer-text {
            font-size: 4mm;
            color: #83638a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-align: center;
            margin-top: auto;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                background: #fff;
                padding: 0;
            }

            .a4-page {
                box-shadow: none;
                border: none;
                border-radius: 0;
                margin: 0;
                width: 210mm;
                min-height: 297mm;
                padding: 20mm;
            }

            body, .a4-page, .qr-card, .stars {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
    <div class="a4-page">
        <div class="page-inner">
            <div class="logo-image">
                <img src="logo_print.jpg" alt="МАНГО">
            </div>

            <div class="headline">Ваш відгук важливий</div>
            <div class="subheadline">Покажіть, що ви задоволені покупкою та допоможіть іншим знайти найкращий вибір нижньої білизни.</div>

            <div class="stars">★★★★★</div>

            <div class="qr-card">
                <img src="qr.png" alt="QR код для відгуків" class="qr-code">
            </div>

            <div class="note">Наведіть камеру на код, щоб перейти до сторінки відгуків. Дякуємо за вашу довіру та вибір МАНГО.</div>
        </div>

        <div class="footer-text">Дякуємо, що обираєте нас ✨</div>
    </div>
</body>
</html>
