<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>QR-код для відгуків МАНГО</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Формат А4 */
        .a4-page {
            width: 210mm;
            height: 297mm;
            background-color: #fff;
            background-image: radial-gradient(circle at center, #fffdfa 0%, #fff 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40mm 20mm;
            border: 1px solid #eaeaea;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            letter-spacing: 8px;
            font-weight: 600;
            color: #111;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .stars {
            color: #fbbc05;
            font-size: 45px;
            margin-bottom: 30px;
            letter-spacing: 5px;
        }
        h1 {
            font-family: 'Comfortaa', sans-serif;
            font-size: 38px;
            color: #111;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        p {
            font-family: 'Comfortaa', sans-serif;
            font-size: 22px;
            color: #555;
            margin-bottom: 50px;
            line-height: 1.5;
        }
        .qr-wrapper {
            background: #fff;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 2px solid #f0f0f0;
            margin-bottom: 50px;
        }
        .qr-code {
            width: 300px;
            height: 300px;
            object-fit: contain;
            display: block;
        }
        .footer-text {
            font-family: 'Comfortaa', sans-serif;
            font-size: 18px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Налаштування для ідеального друку без зайвих елементів */
        @media print {
            body {
                background: none;
                margin: 0;
            }
            .a4-page {
                box-shadow: none;
                border: none;
                width: 100%;
                height: 100%;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div class="a4-page">
        <div class="logo">МАНГО</div>
        
        <div class="stars">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
        </div>

        <h1>Сподобалась покупка?</h1>
        <p>Наведіть камеру смартфона на QR-код<br>та залишіть відгук про наш магазин.<br>Для нас це дуже важливо!</p>

        <div class="qr-wrapper">
            <img src="qr.png" alt="QR код для відгуків" class="qr-code">
        </div>

        <div class="footer-text">Дякуємо, що обираєте нас ✨</div>
    </div>

</body>
</html>
