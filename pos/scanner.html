<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>МАНГО ТЕРМІНАЛ — ULTRA</title>
    
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
        :root {
            --primary: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg-dark: #090d16; --bg-card: rgba(30, 41, 59, 0.7); --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: var(--bg-dark); color: var(--text); padding: 16px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px; }
        
        h2 { background: linear-gradient(135deg, #ffd966, #ffa500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px; text-align: center; font-weight: 800; margin-top: 10px; }
        .badge-row { display: flex; gap: 10px; }
        .badge { flex: 1; background: #1e293b; padding: 10px; border-radius: 30px; font-size: 12px; font-weight: bold; text-align: center; border-left: 4px solid #334155; }
        .badge.active { border-left-color: var(--primary); color: #86efac; background: #064e3b; }
        .badge.freeze { border-left-color: var(--warning); color: #fde047; background: #78350f; }
        
        .cam-box { position: relative; border-radius: 24px; overflow: hidden; border: 2px solid #334155; background: #000; aspect-ratio: 4/3; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .laser-line { position: absolute; width: 90%; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), #fff, var(--primary), transparent); left: 5%; top: 50%; animation: laser 2s infinite ease-in-out; }
        @keyframes laser { 0%, 100% { top: 20%; } 50% { top: 80%; } }
        
        .freeze-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--warning); font-weight: bold; }
        .progress-container { width: 70%; height: 4px; background: #334155; border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--warning); transition: width 0.05s linear; }

        .card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 14px; }
        .input-row { display: flex; gap: 8px; margin-top: 5px; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 12px; color: white; font-size: 16px; font-family: monospace; }
        
        .btn { padding: 14px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 14px; }
        .btn-main { background: #2563eb; color: white; width: 100%; }
        .btn-action { flex: 1; font-size: 12px; padding: 10px; }
        .btn-torch { background: #5b21b6; color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-find { background: var(--primary); color: white; border-radius: 12px; padding: 0 20px; }
    </style>
</head>
<body>

<div class="wrapper" id="main-content">
    <h2>📡 МАНГО · ULTRA TERMINAL</h2>
    
    <div class="badge-row">
        <div class="badge" id="badge-cam">📷 Камера: вимкнена</div>
        <div class="badge" id="badge-server">🖥️ Asus: очікування</div>
    </div>

    <div class="cam-box">
        <video id="video" autoplay playsinline muted></video>
        <div class="laser-line" id="laser" style="display:none;"></div>
        <div class="freeze-overlay" id="freeze-ui">
            <span>⏳ ФІКСАЦІЯ КОДУ...</span>
            <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
        </div>
    </div>

    <div class="btn-row" style="display:flex; gap:10px; margin-top: 5px;">
        <button class="btn btn-main" id="btn-start">▶ ЗАПУСТИТИ СКАНЕР</button>
        <button class="btn btn-action btn-torch" id="btn-torch" style="display:none;">🔦 ЛІХТАР</button>
        <button class="btn btn-action btn-stop" id="btn-stop" style="display:none;">⏹️ СТОП</button>
    </div>

    <div class="card">
        <div style="font-size:11px; color:#94a3b8; font-weight:bold; text-transform:uppercase;">📝 РУЧНЕ ВВЕДЕННЯ (якщо штрихкод стертий)</div>
        <div class="input-row">
            <input type="text" id="manual-input" placeholder="Введіть код вручну..." inputmode="numeric">
            <button class="btn btn-find" id="btn-manual-send">ВНЕСТИ</button>
        </div>
    </div>
    
    <div class="card">
        <div style="font-size:11px; color:#94a3b8; font-weight:bold; text-transform:uppercase; margin-bottom:5px;">🔧 НАЛАШТУВАННЯ АДРЕСИ (IP)</div>
        <input type="text" id="server-ip-field" value="192.168.0.103" style="font-size:14px; padding:8px;">
    </div>
</div>

<script>
    let state = {
        codeReader: new ZXing.BrowserMultiFormatReader(), controls: null, isReady: true, activeTrack: null, torch: false,
        ip: localStorage.getItem('mango_pro_ip') || '192.168.0.103', audioCtx: null
    };

    // Ініціалізація сторінки
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('server-ip-field').value = state.ip;
        
        document.getElementById('server-ip-field').addEventListener('change', (e) => {
            state.ip = e.target.value.trim();
            localStorage.setItem('mango_pro_ip', state.ip);
            document.getElementById('badge-server').innerText = '🖥️ IP оновлено';
        });
    });

    // Звуковий чіп каси
    function beep(freq, dur) {
        try {
            if(!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = state.audioCtx.createOscillator();
            let gain = state.audioCtx.createGain();
            osc.connect(gain); gain.connect(state.audioCtx.destination);
            osc.frequency.value = freq; gain.gain.setValueAtTime(0.2, state.audioCtx.currentTime);
            osc.start(); osc.stop(state.audioCtx.currentTime + (dur/1000));
        } catch(e){}
    }

    async function startScanning() {
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'inline-block';
        document.getElementById('btn-torch').style.display = 'inline-block';
        document.getElementById('badge-cam').className = 'badge active';
        document.getElementById('badge-cam').innerText = '✅ Камера: активна';
        document.getElementById('laser').style.display = 'block';

        try {
            state.controls = await state.codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if(result && state.isReady) {
                    processBarcode(result.text);
                }
            });
            if(state.controls && state.controls.stream) {
                state.activeTrack = state.controls.stream.getVideoTracks()[0];
            }
        } catch(e) { alert("Камера недоступна"); stopScanning(); }
    }

    function stopScanning() {
        if(state.controls) state.controls.stop();
        state.controls = null; state.activeTrack = null; state.torch = false;
        document.getElementById('btn-start').style.display = 'block';
        document.getElementById('btn-stop').style.display = 'none';
        document.getElementById('btn-torch').style.display = 'none';
        document.getElementById('badge-cam').className = 'badge';
        document.getElementById('badge-cam').innerText = '📷 Камера: вимкнена';
        document.getElementById('laser').style.display = 'none';
    }

    async function processBarcode(code) {
        state.isReady = false;
        if(navigator.vibrate) navigator.vibrate([80, 40, 80]);
        beep(1500, 70); setTimeout(() => beep(1900, 90), 80); // Подвійний пік каси МАНГО

        document.getElementById('freeze-ui').style.display = 'flex';
        document.getElementById('badge-cam').className = 'badge freeze';
        document.getElementById('badge-cam').innerText = '⏳ Фіксація...';

        let start = Date.now();
        let interval = setInterval(() => {
            let passed = Date.now() - start;
            let percent = Math.min((passed / 2500) * 100, 100);
            document.getElementById('p-bar').style.width = percent + '%';
            if(passed >= 2500) clearInterval(interval);
        }, 50);

        await sendData(code);

        setTimeout(() => {
            document.getElementById('freeze-ui').style.display = 'none';
            document.getElementById('p-bar').style.width = '0%';
            state.isReady = true;
            if(state.controls) {
                document.getElementById('badge-cam').className = 'badge active';
                document.getElementById('badge-cam').innerText = '✅ Камера: active';
            }
        }, 2500);
    }

    async function sendData(barcode) {
        document.getElementById('badge-server').className = 'badge';
        document.getElementById('badge-server').innerText = '📡 Передача...';
        try {
            let res = await fetch(`http://${state.ip}:5000/scan`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ barcode: barcode })
            });
            if(res.ok) {
                document.getElementById('badge-server').className = 'badge active';
                document.getElementById('badge-server').innerText = '✅ На комп\'ютері';
            } else { throw new Error(); }
        } catch(e) {
            document.getElementById('badge-server').className = 'badge freeze';
            document.getElementById('badge-server').innerText = '❌ Помилка Wi-Fi';
            beep(300, 200); // Звук помилки мережі
        }
    }

    // Слухачі подій
    document.getElementById('btn-start').addEventListener('click', startScanning);
    document.getElementById('btn-stop').addEventListener('click', stopScanning);
    
    document.getElementById('btn-torch').addEventListener('click', async () => {
        if(!state.activeTrack) return;
        state.torch = !state.torch;
        await state.activeTrack.applyConstraints({advanced: [{torch: state.torch}]});
    });

    document.getElementById('btn-manual-send').addEventListener('click', () => {
        let code = document.getElementById('manual-input').value.trim();
        if(code) {
            sendData(code);
            document.getElementById('manual-input').value = '';
        }
    });
</script>
</body>
</html>
