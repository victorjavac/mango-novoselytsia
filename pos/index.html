<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каса МАНГО — Авторизація</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="auth-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f4f6f8;">
        <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px;">
            <img src="../favicon.jpg" alt="МАНГО" style="width: 80px; border-radius: 50%; margin-bottom: 20px;">
            <h2 style="margin-bottom: 20px; font-family: sans-serif;">Вхід у Касу</h2>
            <input type="email" id="auth-email" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
            <input type="password" id="auth-password" placeholder="Пароль" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px;">
            <button id="login-btn" style="width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">УВІЙТИ</button>
            <p id="auth-error" style="color: red; font-size: 13px; margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <div id="cart-section">
            <h2>Поточний чек <span id="user-display" style="font-size: 14px; color: #666; font-weight: normal;"></span></h2>
            <ul id="cart-items"></ul>
            <div id="discount-section">
                <input type="number" id="discount-input" placeholder="Знижка (грн)">
                <button id="apply-discount-btn">Застосувати</button>
            </div>
            <div id="total-price">Разом до сплати: <span>0</span> грн</div>
        </div>

        <div id="control-section">
            <input type="text" id="barcode-input" placeholder="Скануйте товар..." autocomplete="off">
            <button id="pay-button">ОПЛАТИТИ ТА ДРУКУВАТИ ЧЕК</button>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="z-report-btn" style="background: #6c757d; color: white; flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">📊 Z-Звіт</button>
                <button id="open-warehouse-btn" style="background: #17a2b8; color: white; flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">📦 СКЛАД</button>
                <button id="logout-btn" style="background: #dc3545; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Вихід</button>
            </div>

            <div id="admin-section" style="margin-top: 20px;">
                <h3>Прийом товару</h3>
                <div class="admin-inputs">
                    <input type="text" id="new-barcode" placeholder="Штрихкод">
                    <input type="text" id="new-name" placeholder="Назва товару">
                    <input type="number" id="new-price" placeholder="Ціна">
                    <input type="number" id="new-quantity" placeholder="Кількість">
                    <button id="add-product-btn">ДОДАТИ НА СКЛАД</button>
                </div>
            </div>
        </div>
    </div>

    <div id="warehouse-modal" class="modal">
        <div class="modal-content" style="background: #fff; max-width: 650px; width: 100%;">
            <span class="close-btn">&times;</span>
            
            <h2 style="border: none; margin-bottom: 15px;">📦 Управління складом МАНГО</h2>
            
            <div style="display: flex; gap: 8px; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
                <button id="tab-active" style="padding: 8px 16px; background: #28a745; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;">🟢 Активні</button>
                <button id="tab-archive" style="padding: 8px 16px; background: #6c757d; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;">📦 Архів</button>
                <button id="tab-trash" style="padding: 8px 16px; background: #dc3545; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;">🗑️ Кошик</button>
            </div>

            <table id="warehouse-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #f4f6f8;">
                        <th style="padding: 10px; text-align: left;">Код</th>
                        <th style="padding: 10px; text-align: left;">Назва</th>
                        <th style="padding: 10px; text-align: left;">Ціна</th>
                        <th style="padding: 10px; text-align: left;">К-сть</th>
                        <th style="padding: 10px; text-align: center;">Дія</th>
                    </tr>
                </thead>
                <tbody id="warehouse-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="print-section"></div>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="js/app.js"></script>
    
   <script>
    // =========================================================
    // МАНГО-PRO: ПОЛНЫЙ ЦИКЛ УПРАВЛЕНИЯ (УДАЛЕНИЕ И ВОССТАНОВЛЕНИЕ)
    // =========================================================
    let currentViewStatus = 'active'; 

    // 1. ФУНКЦИЯ УДАЛЕНИЯ (Вперед по цепочке)
    async function deleteProductWorkflow(productId, currentStatus) {
        if (!currentStatus || currentStatus === 'active') {
            await db.collection('продукти').doc(productId).update({
                archived: true,
                status: 'archive'
            });
            alert('📦 Товар успішно переміщено в Архів!');
            loadWarehouseTableSecure(currentViewStatus); 
            return;
        }

        if (currentStatus === 'archive') {
            await db.collection('продукти').doc(productId).update({
                status: 'trash'
            });
            alert('🗑️ Товар переміщено в Кошик сміття!');
            loadWarehouseTableSecure(currentViewStatus);
            return;
        }

        if (currentStatus === 'trash') {
            const confirmDelete = window.confirm(
                `⚠️ УВАГА! Ви намагаєтесь видалити товар (Код: ${productId}) НАЗАВЖДИ.\n\n` +
                `Цей товар зникне з бази даних магазину МАНГО безповоротно! Його залишки та історія будуть стерті.\n\n` +
                `Ви впевнені у своїй дії? Натисніть "ОК" для видалення або "Скасувати".`
            );
            
            if (confirmDelete) {
                await db.collection('продукти').doc(productId).delete();
                alert('🔥 Товар повністю та безповоротно випалено з бази даних!');
                loadWarehouseTableSecure(currentViewStatus);
            }
        }
    }

    // 2. НОВАЯ ФУНКЦИЯ ВОССТАНОВЛЕНИЯ (Назад в активные)
    async function restoreProductWorkflow(productId) {
        try {
            await db.collection('продукти').doc(productId).update({
                archived: false, // Возвращаем в общую кассу
                status: 'active' // Сбрасываем статус архива/корзины
            });
            alert('🟢 Товар успішно повернуто в Активні залишки!');
            loadWarehouseTableSecure(currentViewStatus); // Перезагружаем текущую вкладку
        } catch (err) {
            alert('Помилка відновлення: ' + err.message);
        }
    }

    // 3. ОТРИСОВКА ТАБЛИЦЫ С УМНЫМИ КНОПКАМИ
    async function loadWarehouseTableSecure(status = 'active') {
        currentViewStatus = status;
        const tableBody = document.getElementById('warehouse-table-body');
        if (!tableBody) return;
        
        tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px; color:#888;">⏳ Завантаження даних...</td></tr>`;
        
        try {
            let query = db.collection('продукти');
            
            if (status === 'active') {
                query = query.where('archived', '==', false);
            } else if (status === 'archive') {
                query = query.where('status', '==', 'archive');
            } else if (status === 'trash') {
                query = query.where('status', '==', 'trash');
            }
            
            const snapshot = await query.get();
            if (snapshot.empty) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px; color:#999;">📭 У цьому розділі немає товарів</td></tr>`;
                return;
            }
            
            tableBody.innerHTML = snapshot.docs.map(doc => {
                const p = doc.data();
                const id = doc.id;
                
                let btnText = '🗑️ Архів';
                let restoreBtn = ''; // По умолчанию для активных кнопки возврата нет
                
                // Если мы в Архиве или Корзине — добавляем зеленую кнопку «Вернуть»
                if (status === 'archive') {
                    btnText = '🗑️ В Кошик';
                    restoreBtn = `<button onclick="restoreProductWorkflow('${id}')" style="padding: 4px 10px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-size:12px; margin-right:5px;">🔄 Вернути</button>`;
                }
                if (status === 'trash') {
                    btnText = '🔥 ВИДАЛИТИ';
                    restoreBtn = `<button onclick="restoreProductWorkflow('${id}')" style="padding: 4px 10px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-size:12px; margin-right:5px;">🔄 Вернути</button>`;
                }
                
                return `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 10px; font-family: monospace;">${id}</td>
                        <td style="padding: 10px;">${p.name || 'Без назви'}</td>
                        <td style="padding: 10px;">${p.price} грн</td>
                        <td style="padding: 10px;">${p.quantity} шт</td>
                        <td style="padding: 10px; text-align: center; display: flex; justify-content: center; align-items: center; gap: 4px;">
                            ${restoreBtn}
                            <button onclick="deleteProductWorkflow('${id}', '${status}')" style="padding: 4px 10px; background:#dc3545; color:white; border:none; border-radius:5px; cursor:pointer; font-size:12px;">${btnText}</button>
                        </td>
                    </tr>
                `;
            }).join('');
            
        } catch (err) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red; padding:20px;">Помилка: ${err.message}</td></tr>`;
        }
    }

    // Привязываем события к кнопкам-вкладкам
    document.getElementById('tab-active').addEventListener('click', () => loadWarehouseTableSecure('active'));
    document.getElementById('tab-archive').addEventListener('click', () => loadWarehouseTableSecure('archive'));
    document.getElementById('tab-trash').addEventListener('click', () => loadWarehouseTableSecure('trash'));

    // Перехватываем кнопку открытия склада
    document.getElementById('open-warehouse-btn').addEventListener('click', () => {
        setTimeout(() => {
            loadWarehouseTableSecure('active');
        }, 200);
    });
    </script>
</body>
</html>
